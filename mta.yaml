_schema-version: "3.3.0"
ID: btp-sap-odata-to-mcp-server
description: "SAP OData to MCP Server Multi-target application"
version: 1.0.0

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm i

modules:
  # ─────────────────────────────────────────────────────────────────────────────
  # Single Destination variant
  # Route: {org}-{space}-sap-mcp-server-single.cfapps.ap10.hana.ondemand.com
  # Uses one BTP Destination (SAP_DESTINATION_NAME) for both discovery and
  # execution. Simpler setup — technical user credentials baked into the
  # destination.
  # ─────────────────────────────────────────────────────────────────────────────
  - name: sap-mcp-server-single
    type: nodejs
    path: ./
    parameters:
      app-name: sap-mcp-server-single
      memory: 512M
      disk-quota: 1G
      buildpack: nodejs_buildpack
      command: npm run start
      health-check-type: http
      health-check-http-endpoint: /health
      timeout: 180
    properties:
      LOG_LEVEL: info
      # Single destination: one destination for discovery and execution
      SAP_DESTINATION_NAME: MCF-GATEWAY
      # MCP Config App URL for per-user permission enforcement.
      # Set to the deployed URL of the mcp-config-srv module, e.g.:
      #   https://<org>-<space>-mcp-config-srv.cfapps.ap10.hana.ondemand.com
      # Leave empty to disable permission checks (all operations allowed).
      MCP_CONFIG_APP_URL: "https://fortescue-mcp-poc-poc-mcp-config-srv.cfapps.ap10.hana.ondemand.com"
      # Enforcement mode: strict (deny on error) | permissive (allow on error)
      MCP_PERMISSION_ENFORCEMENT_MODE: strict
    build-parameters:
      builder: custom
      commands:
        - npm run build
      ignore:
        - node_modules/
        - .git/
        - tests/
        - mta_archives/
    requires:
      - name: sap-mcp-destination
      - name: sap-mcp-connectivity
      - name: sap-mcp-xsuaa

  # ─────────────────────────────────────────────────────────────────────────────
  # Dual Destination variant
  # Route: {org}-{space}-sap-mcp-server-dual.cfapps.ap10.hana.ondemand.com
  # Uses two BTP Destinations:
  #   SAP_DISCOVERY_DESTINATION_NAME — technical user, for OData service discovery
  #   SAP_EXECUTION_DESTINATION_NAME — principal propagation / OAuth2SAMLBearer,
  #                                    for executing OData calls on behalf of the
  #                                    authenticated user (JWT forwarded)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: sap-mcp-server-dual
    type: nodejs
    path: ./
    parameters:
      app-name: sap-mcp-server-dual
      memory: 512M
      disk-quota: 1G
      buildpack: nodejs_buildpack
      command: npm run start
      health-check-type: http
      health-check-http-endpoint: /health
      timeout: 180
    properties:
      LOG_LEVEL: info
      # Dual destination: separate destinations for discovery vs execution
      SAP_DISCOVERY_DESTINATION_NAME: MCF-GATEWAY
      SAP_EXECUTION_DESTINATION_NAME: MCF-GATEWAY-SSO
      # MCP Config App URL for per-user permission enforcement.
      # Set to the deployed URL of the mcp-config-srv module, e.g.:
      #   https://<org>-<space>-mcp-config-srv.cfapps.ap10.hana.ondemand.com
      # Leave empty to disable permission checks (all operations allowed).
      MCP_CONFIG_APP_URL: "https://fortescue-mcp-poc-poc-mcp-config-srv.cfapps.ap10.hana.ondemand.com"
      # Enforcement mode: strict (deny on error) | permissive (allow on error)
      MCP_PERMISSION_ENFORCEMENT_MODE: strict
    build-parameters:
      builder: custom
      commands:
        - npm run build
      ignore:
        - node_modules/
        - .git/
        - tests/
        - mta_archives/
    requires:
      - name: sap-mcp-destination
      - name: sap-mcp-connectivity
      - name: sap-mcp-xsuaa

resources:
  # Destination Service
  - name: sap-mcp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-name: sap-mcp-destination-${space}
      service-plan: lite

  # Connectivity Service
  - name: sap-mcp-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: sap-mcp-connectivity-${space}
      service: connectivity
      service-plan: lite

  # XSUAA Service
  - name: sap-mcp-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: sap-mcp-xsuaa-${space}
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: btp-sap-odata-to-mcp-server-${space}
        tenant-mode: dedicated
